<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="signup.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <title>DataWizard - Sign up</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="i18n.js"></script>
</head>
<body>

<div id="signupModal" class="modal" style="display: flex;">

  <div class="modal-content">

    <a href="home2.html" class="close-modal">&times;</a>

    <div class="title" data-i18n="signUpTitle">Sign Up</div>
    <div class="subtitle" data-i18n="signUpSubtitle">Let's get started with your 30 days free trial</div>

    <form id="signupForm">
      <div class="form-group">
        <label for="name" data-i18n="name">Name</label>
        <input type="text" id="name" data-i18n-placeholder="namePlaceholder" placeholder="Enter your name" required>
      </div>

      <div class="form-group">
        <label for="email" data-i18n="email">Email</label>
        <input type="email" id="email" data-i18n-placeholder="emailPlaceholder" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label for="password" data-i18n="password">Password</label>
        <input type="password" id="password" data-i18n-placeholder="passPlaceholder" placeholder="Enter password" required>
      </div>

      <button type="submit" class="signup-btn" data-i18n="signUpBtn">Sign Up</button>
    </form>

    <p class="already"><span data-i18n="alreadyAccount">Already have an account?</span> <a href="login.html" data-i18n="logInLink">Log In</a></p>
    <br>

    <p class="terms"><span data-i18n="termsText">By signing up, you agree to our</span> <a href="#" data-i18n="termsOfUse">Terms of Use</a> <span data-i18n="andWord">and</span> <a href="#" data-i18n="privacyPolicy">Privacy Policy</a>.</p>

  </div>
</div>

<script>
document.getElementById("signupForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const btn = this.querySelector('button[type="submit"]');
    btn.innerHTML = '<span style="display:inline-block; animation: pulse 1s infinite;">' + t('creatingAccount') + '</span>';
    btn.disabled = true;
    
    // Simulate network request
    setTimeout(() => {
        window.location.href = "home2.html?signup=success";
    }, 1500);
});
</script>

</body>
</html>
