<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="forgot-password.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <title>DataWizard - Forgot Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="i18n.js"></script>
</head>
<body>

<div id="forgotPasswordPopup" class="popup-overlay" style="display: flex;">

    <div class="forgot-password-card">

        <a href="login.html" class="close-btn">&times;</a>

        <div class="icon-circle">🔑</div>

        <div class="title" data-i18n="forgotPassword">Forgot Password?</div>
        <div class="subtitle" data-i18n="forgotPasswordSubtitle">Enter your email to receive a password reset link</div>

        <form id="forgotPasswordForm">
            <label data-i18n="email">Email</label>
            <input type="email" id="emailInput" data-i18n-placeholder="emailPlaceholder" placeholder="Enter your email" required>

            <button type="submit" data-i18n="sendResetLink">Send Reset Link</button>
        </form>

        <p class="back-to-login">
            <span data-i18n="rememberPassword">Remember your password?</span> <a href="login.html" data-i18n="backToLogin">Back to Login</a>
        </p>

        <div id="messageContainer" class="message-container"></div>

    </div>
</div>

<script>
document.getElementById("forgotPasswordForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("emailInput").value;
    const btn = this.querySelector('button');
    const messageContainer = document.getElementById("messageContainer");

    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
    btn.disabled = true;
    messageContainer.innerHTML = "";

    try {
        const res = await fetch("http://127.0.0.1:8000/auth/forgot-password", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (!res.ok) {
            // Show error message
            messageContainer.innerHTML = `<div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> ${data.detail || "An error occurred"}</div>`;
            btn.innerHTML = "Send Reset Link";
            btn.disabled = false;
            return;
        }

        // Show success message
        messageContainer.innerHTML = `<div class="alert alert-success"><i class="fas fa-check-circle"></i> ${data.detail}</div>`;
        
        // Clear form
        this.reset();
        
        // Redirect to login after 3 seconds
        setTimeout(() => {
            window.location.href = "login.html";
        }, 3000);

    } catch (err) {
        messageContainer.innerHTML = `<div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> Server error. Please try again later.</div>`;
        btn.innerHTML = "Send Reset Link";
        btn.disabled = false;
    }
});
</script>

</body>
</html>
