<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <title>DataWizard - Log in</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="i18n.js"></script>
</head>
<body>

<div id="loginPopup" class="popup-overlay" style="display: flex;">

    <div class="login-card">

        <a href="home2.html" class="close-btn">&times;</a>

        <div class="icon-circle">➜</div>

        <div class="title" data-i18n="welcomeBack">Welcome Back</div>
        <div class="subtitle" data-i18n="signInAccount">Sign in to your account</div>

        <form id="loginForm">
            <label data-i18n="email">Email</label>
            <input type="email" data-i18n-placeholder="emailPlaceholder" placeholder="Enter your email" required>

            <label data-i18n="password">Password</label>
            <input type="password" data-i18n-placeholder="passPlaceholder" placeholder="Enter password" required>

            <button type="submit" data-i18n="signInBtn">Sign In</button>
        </form>

        <a href="#" class="forgot" data-i18n="forgotPass">Forgot password?</a>

        <p class="already-have-account">
            <span data-i18n="noAccount">Don't have an account?</span> <a href="signup.html" data-i18n="signUpLink">Sign up</a>
        </p>

    </div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault(); 
    const btn = this.querySelector('button[type="submit"]');
    btn.innerHTML = '<span style="display:inline-block; animation: pulse 1s infinite;">' + t('authenticating') + '</span>';
    btn.disabled = true;
    
    // Simulate network request
    setTimeout(() => {
        window.location.href = "home2.html?login=success";
    }, 1500);
});
</script>

</body>
</html>
