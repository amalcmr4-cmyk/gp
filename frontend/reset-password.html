<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="reset-password.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <title>DataWizard - Reset Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="i18n.js"></script>
</head>
<body>

<div id="resetPasswordPopup" class="popup-overlay" style="display: flex;">

    <div class="reset-password-card">

        <a href="login.html" class="close-btn">&times;</a>

        <div class="icon-circle">✓</div>

        <div class="title" data-i18n="resetPassword">Reset Password</div>
        <div class="subtitle" data-i18n="resetPasswordSubtitle">Enter your new password below</div>

        <form id="resetPasswordForm">
            <div id="tokenInput" style="display: none;"></div>
            
            <label data-i18n="password">New Password</label>
            <div class="password-container">
                <input type="password" id="passwordInput" data-i18n-placeholder="passPlaceholder" placeholder="Enter new password" required>
                <button type="button" class="toggle-password" onclick="togglePasswordVisibility('passwordInput')">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
            <div class="password-requirements">
                <p class="requirement" id="req-length">
                    <i class="fas fa-check"></i> At least 8 characters
                </p>
                <p class="requirement" id="req-uppercase">
                    <i class="fas fa-check"></i> At least one uppercase letter
                </p>
                <p class="requirement" id="req-lowercase">
                    <i class="fas fa-check"></i> At least one lowercase letter
                </p>
                <p class="requirement" id="req-digit">
                    <i class="fas fa-check"></i> At least one digit
                </p>
            </div>

            <label data-i18n="confirmPassword">Confirm Password</label>
            <div class="password-container">
                <input type="password" id="confirmPasswordInput" data-i18n-placeholder="confirmPassPlaceholder" placeholder="Confirm new password" required>
                <button type="button" class="toggle-password" onclick="togglePasswordVisibility('confirmPasswordInput')">
                    <i class="fas fa-eye"></i>
                </button>
            </div>

            <button type="submit" data-i18n="resetPasswordBtn">Reset Password</button>
        </form>

        <p class="back-to-login">
            <span data-i18n="backToLogin2">Back to</span> <a href="login.html" data-i18n="loginLink">Login</a>
        </p>

        <div id="messageContainer" class="message-container"></div>

    </div>
</div>

<script>
function getResetTokenFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get('token');
}

function validatePassword(password) {
    const requirements = {
        length: password.length >= 8,
        uppercase: /[A-Z]/.test(password),
        lowercase: /[a-z]/.test(password),
        digit: /\d/.test(password)
    };
    return requirements;
}

function updatePasswordRequirements(password) {
    const reqs = validatePassword(password);
    
    document.getElementById('req-length').classList.toggle('met', reqs.length);
    document.getElementById('req-uppercase').classList.toggle('met', reqs.uppercase);
    document.getElementById('req-lowercase').classList.toggle('met', reqs.lowercase);
    document.getElementById('req-digit').classList.toggle('met', reqs.digit);
}

function togglePasswordVisibility(inputId) {
    const input = document.getElementById(inputId);
    const btn = event.target.closest('.toggle-password');
    
    if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = '<i class="fas fa-eye-slash"></i>';
    } else {
        input.type = 'password';
        btn.innerHTML = '<i class="fas fa-eye"></i>';
    }
}


document.addEventListener('DOMContentLoaded', function() {
    const token = getResetTokenFromURL();
    
    if (!token) {
        const messageContainer = document.getElementById("messageContainer");
        messageContainer.innerHTML = `<div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> Invalid or missing reset token. Please request a new password reset.</div>`;
        document.getElementById("resetPasswordForm").style.display = "none";
        
        setTimeout(() => {
            window.location.href = "forgot-password.html";
        }, 10000);
        return;
    }
    
    // Store token in hidden field
    document.getElementById("tokenInput").value = token;
});

document.getElementById("passwordInput").addEventListener("input", function() {
    updatePasswordRequirements(this.value);
});

document.getElementById("resetPasswordForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const token = getResetTokenFromURL();
    const newPassword = document.getElementById("passwordInput").value;
    const confirmPassword = document.getElementById("confirmPasswordInput").value;
    const btn = this.querySelector('button[type="submit"]');
    const messageContainer = document.getElementById("messageContainer");

    messageContainer.innerHTML = "";

    if (newPassword !== confirmPassword) {
        messageContainer.innerHTML = `<div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> Passwords do not match.</div>`;
        return;
    }

    const reqs = validatePassword(newPassword);
    if (!reqs.length || !reqs.uppercase || !reqs.lowercase || !reqs.digit) {
        messageContainer.innerHTML = `<div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> Password does not meet all requirements.</div>`;
        return;
    }

    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...';
    btn.disabled = true;

    try {
        const res = await fetch("http://127.0.0.1:8000/auth/reset-password", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ 
                token: token,
                new_password: newPassword 
            })
        });

        const data = await res.json();

        if (!res.ok) {
            messageContainer.innerHTML = `<div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> ${data.detail || "Failed to reset password"}</div>`;
            btn.innerHTML = "Reset Password";
            btn.disabled = false;
            return;
        }

        messageContainer.innerHTML = `<div class="alert alert-success"><i class="fas fa-check-circle"></i> ${data.detail}</div>`;
        
        document.getElementById("resetPasswordForm").style.display = "none";
        
        setTimeout(() => {
            window.location.href = "login.html?reset=success";
        }, 2000);

    } catch (err) {
        messageContainer.innerHTML = `<div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> Server error. Please try again later.</div>`;
        btn.innerHTML = "Reset Password";
        btn.disabled = false;
    }
});
</script>

</body>
</html>
